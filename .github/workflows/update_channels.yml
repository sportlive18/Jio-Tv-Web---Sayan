name: Update Channels (Auto Sync MPD & Keys)

on:
  schedule:
    - cron: '0 */3 * * *' # Checks every 3 hours
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate channel HTML files and fetch keys
        run: python generate_channels.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --cached --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "🔄 Auto-update channels: MPD & keys synced ($TIMESTAMP)"
          git push
